<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#071b55">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FRIEND">
<meta name="mobile-web-app-capable" content="yes">
<title>F.R.I.E.N.D. Enterprise</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main id="app" aria-live="polite"></main>
<div id="toast" role="status"></div>
<button id="fullscreen-toggle" type="button" aria-label="Enter full screen" hidden>⛶</button>
<dialog id="assistant">
  <div class="dialog-head">
    <div class="assistant-brand"><img class="assistant-robot-image" src="images/friend-robot.webp" alt="King Soopers AI robot"><div class="assistant-speech"><strong>Ask me to open a module,</strong><span>or say “take a note…”</span></div></div>
    <button id="assistant-close" aria-label="Close">×</button>
  </div>
  <div class="assistant-tabs" role="tablist">
    <button class="tab active" data-tab="chat-panel" type="button">Assistant</button>
    <button class="tab" data-tab="notes-panel" type="button">Notes <span id="note-count">0</span></button>
  </div>
  <section id="chat-panel" class="assistant-panel active">
    <div id="chat"><p class="assistant-welcome">I’m ready to help.</p></div>
    <form id="assistant-form">
      <input id="assistant-input" autocomplete="off" placeholder="Open Produce or Take a note…" aria-label="Assistant request">
      <button type="submit">Send</button>
      <button id="assistant-mic" type="button" aria-label="Speak">🎤</button>
    </form>
  </section>
  <section id="notes-panel" class="assistant-panel">
    <form id="note-form">
      <textarea id="note-input" rows="3" placeholder="Write a note for this screen…" aria-label="New note"></textarea>
      <button type="submit">Save Note</button>
    </form>
    <div class="note-actions">
      <button id="copy-notes" type="button">Copy Notes</button>
      <button id="export-notes" type="button">Export Notes</button>
      <button id="clear-notes" type="button" class="danger">Clear All</button>
    </div>
    <div id="notes-list" aria-live="polite"></div>
  </section>
</dialog>
<script type="module" src="app.js"></script>
</body>
</html>
