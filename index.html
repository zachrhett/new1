<style>

.homeNav{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tile{height:58px;padding:6px 3px;text-align:center;color:var(--blue);font-size:11px;line-height:1.1;font-weight:900}.tile .tileIcon{font-size:21px;line-height:1;margin-bottom:2px}.tile small{display:block;font-size:9.2px;font-weight:700;color:#09235d;line-height:1.05;margin-top:1px}.tile .badge2{position:absolute;background:var(--red);color:white;border-radius:50%;font-size:11px;width:20px;height:20px;display:grid;place-items:center;top:4px;right:19px}.tile{position:relative}
.footer{position:absolute;left:0;right:0;bottom:0;height:42px;background:linear-gradient(135deg,#002b87,#001c61);color:white;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:12px;font-weight:700}.phoneBtns{position:absolute;bottom:13px;left:70px;right:70px;display:flex;justify-content:space-between;color:#d0d0d0;font-size:23px}
.detail{padding:18px}.detail h2{color:var(--blue);font-size:20px;margin:0 0 10px}.bigBtn{width:100%;height:48px;border-radius:10px;background:#108d36;color:#fff;font-weight:900;margin-top:12px}.back{color:white;font-size:26px;font-weight:900}
@media(max-width:900px){.device{transform:scale(min(calc((100vw - 8px)/402), calc((100vh - 8px)/820), 1));}}
</style>
